name: weather-bot

# Runs every 3 hours and can be triggered by hand.
# Before 16 days out from START_DATE the script exits cleanly (nothing to forecast);
# once the window is in range it posts the driest region to Telegram.
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:        # lets you run it manually from the Actions tab

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send driest-region update
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          START_DATE: "2026-06-13"
          END_DATE: "2026-06-21"
        run: python weather_bot.py
